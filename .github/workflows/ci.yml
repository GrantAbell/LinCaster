name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev \
            libasound2-dev \
            libusb-1.0-0-dev \
            libdbus-1-dev \
            libclang-dev \
            pkg-config

      - name: Upgrade SPA headers to PipeWire 1.2+
        run: |
          # libspa-rs 0.9.2 requires PipeWire >= 1.2 C headers
          # (spa_video_info_raw gained a flags field and modifier changed to u64).
          # Ubuntu 24.04 ships PipeWire 1.0.x, so we patch the SPA headers in-place.
          PW_TAG=1.2.7
          curl -sL "https://gitlab.freedesktop.org/pipewire/pipewire/-/archive/${PW_TAG}/pipewire-${PW_TAG}.tar.gz" \
            | tar xz -C /tmp
          sudo cp -r /tmp/pipewire-${PW_TAG}/spa/include/spa/* /usr/include/spa-0.2/spa/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- No background — fully transparent -->

  <!-- 1. Diagonal slash through the full circle -->
  <line x1="153" y1="313" x2="359" y2="107"
        stroke="#E31E24" stroke-width="32" stroke-linecap="round"/>

  <!-- 2. Ring drawn on top — overlaps the slash at the intersection points,
       giving an authentic Ø look -->
  <circle cx="256" cy="210" r="120" fill="none" stroke="#E31E24" stroke-width="36"/>

  <!-- LinCaster label -->
  <text x="256" y="422" font-family="'Arial','Helvetica',sans-serif" font-size="48"
        font-weight="700" fill="#E31E24" text-anchor="middle" letter-spacing="6">LinCaster</text>
</svg>
